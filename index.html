<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      padding: 28px 24px 20px;
      color: #fff;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header .stats {
      font-size: 13px;
      opacity: 0.85;
    }

    .input-area {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #6366f1;
    }

    .input-area button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.2s;
      line-height: 1;
    }

    .input-area button:hover {
      background: #4f46e5;
    }

    .filters {
      display: flex;
      gap: 0;
      padding: 12px 24px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filter-btn {
      background: none;
      border: 1.5px solid #e5e7eb;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.2s;
    }

    .filter-btn:first-child { border-radius: 8px 0 0 8px; }
    .filter-btn:last-child  { border-radius: 0 8px 8px 0; border-left: none; }
    .filter-btn:not(:first-child):not(:last-child) { border-left: none; }

    .filter-btn.active {
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
    }

    .todo-list {
      list-style: none;
      min-height: 60px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid #f5f5f7;
      transition: background 0.15s;
    }

    .todo-item:hover {
      background: #fafafa;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #b0b7c3;
    }

    .todo-check {
      width: 20px;
      height: 20px;
      border: 2px solid #d1d5db;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .todo-item.done .todo-check {
      background: #6366f1;
      border-color: #6366f1;
    }

    .todo-check::after {
      content: '';
      width: 6px;
      height: 6px;
      background: #fff;
      border-radius: 50%;
      display: none;
    }

    .todo-item.done .todo-check::after {
      display: block;
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      color: #374151;
      word-break: break-word;
    }

    .todo-text[contenteditable="true"] {
      outline: none;
      background: #f3f4f6;
      border-radius: 4px;
      padding: 2px 6px;
    }

    .todo-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .todo-item:hover .todo-actions {
      opacity: 1;
    }

    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 14px;
      transition: background 0.15s;
    }

    .btn-edit:hover  { background: #ede9fe; }
    .btn-delete:hover { background: #fee2e2; }

    .empty {
      text-align: center;
      color: #b0b7c3;
      padding: 40px 24px;
      font-size: 14px;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-top: 1px solid #f0f0f0;
      font-size: 12px;
      color: #9ca3af;
    }

    .btn-clear {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .btn-clear:hover { background: #fee2e2; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Yapılacaklar</h1>
      <div class="stats" id="stats">0 görev</div>
    </div>

    <div class="input-area">
      <input type="text" id="newTodo" placeholder="Yeni görev ekle..." maxlength="200">
      <button id="addBtn" title="Ekle">+</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Tümü</button>
      <button class="filter-btn" data-filter="active">Aktif</button>
      <button class="filter-btn" data-filter="done">Tamamlanan</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <div class="footer">
      <span id="remaining"></span>
      <button class="btn-clear" id="clearDone">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';
    let editingId = null;

    const input    = document.getElementById('newTodo');
    const list     = document.getElementById('todoList');
    const stats    = document.getElementById('stats');
    const remaining = document.getElementById('remaining');

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function nextId() {
      return Date.now() + Math.random();
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: nextId(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggleTodo(id) {
      const t = todos.find(t => t.id === id);
      if (t) { t.done = !t.done; save(); render(); }
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function startEdit(id, el) {
      editingId = id;
      el.contentEditable = true;
      el.focus();
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
    }

    function commitEdit(id, el) {
      const text = el.textContent.trim();
      if (text) {
        const t = todos.find(t => t.id === id);
        if (t) t.text = text;
        save();
      }
      editingId = null;
      el.contentEditable = false;
      render();
    }

    function filteredTodos() {
      if (filter === 'active') return todos.filter(t => !t.done);
      if (filter === 'done')   return todos.filter(t => t.done);
      return todos;
    }

    function render() {
      const shown = filteredTodos();
      const total = todos.length;
      const doneCount = todos.filter(t => t.done).length;
      const activeCount = total - doneCount;

      stats.textContent = `${total} görev · ${doneCount} tamamlandı`;
      remaining.textContent = `${activeCount} görev kaldı`;

      if (shown.length === 0) {
        list.innerHTML = `<div class="empty">Görev yok</div>`;
        return;
      }

      list.innerHTML = shown.map(t => `
        <li class="todo-item${t.done ? ' done' : ''}" data-id="${t.id}">
          <div class="todo-check" data-action="toggle"></div>
          <span class="todo-text" data-action="text">${escHtml(t.text)}</span>
          <div class="todo-actions">
            <button class="btn-icon btn-edit" data-action="edit" title="Düzenle">✏️</button>
            <button class="btn-icon btn-delete" data-action="delete" title="Sil">🗑️</button>
          </div>
        </li>
      `).join('');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Event delegation
    list.addEventListener('click', e => {
      const item = e.target.closest('.todo-item');
      if (!item) return;
      const id = Number(item.dataset.id) || parseFloat(item.dataset.id);
      const action = e.target.dataset.action || e.target.closest('[data-action]')?.dataset.action;

      if (action === 'toggle') toggleTodo(id);
      else if (action === 'delete') deleteTodo(id);
      else if (action === 'edit') {
        const textEl = item.querySelector('.todo-text');
        startEdit(id, textEl);
      }
    });

    list.addEventListener('keydown', e => {
      if (editingId === null) return;
      if (e.key === 'Enter') {
        e.preventDefault();
        const item = e.target.closest('.todo-item');
        if (item) commitEdit(editingId, e.target);
      }
      if (e.key === 'Escape') {
        editingId = null;
        e.target.contentEditable = false;
        render();
      }
    });

    list.addEventListener('blur', e => {
      if (editingId !== null && e.target.dataset.action === 'text') {
        const item = e.target.closest('.todo-item');
        if (item) commitEdit(editingId, e.target);
      }
    }, true);

    document.getElementById('addBtn').addEventListener('click', addTodo);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    document.getElementById('clearDone').addEventListener('click', () => {
      todos = todos.filter(t => !t.done);
      save();
      render();
    });

    render();
  </script>
</body>
</html>
